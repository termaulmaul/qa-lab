<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>QA Lab Trading UI - Login</title>
    <link rel="stylesheet" href="/ui/styles.css">
  </head>
  <body class="login-page">
    <div id="login-view" class="view">
      <main class="login-shell">
        <section class="hero">
          <p class="eyebrow">QA Trading Desk</p>
          <h1>Trading App UI Lab</h1>
          <p class="subtitle">UI automation flow for login, market watch, portfolio polling, watchlist, order history, and order placement.</p>
        </section>
        <section class="panel login-panel" id="login-panel">
          <div class="panel-head" style="justify-content: center; border-bottom: none; margin-bottom: 10px;">
            <h2>Welcome Back</h2>
          </div>
          <form id="login-form" class="stack">
            <label>
              Username
              <input id="username" name="username" type="text" value="qa_user" autocomplete="username">
            </label>
            <label>
              Password
              <input id="password" name="password" type="password" value="qa_pass" autocomplete="current-password">
            </label>
            <button id="login-button" type="submit">Login</button>
          </form>
          <p class="message" id="login-message" aria-live="polite"></p>
        </section>
      </main>
    </div>
    <script src="/ui/login.js"></script>
  </body>
</html>
